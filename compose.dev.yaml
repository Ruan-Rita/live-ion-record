services:
  server_api:
    build:
      context: backend/.
      dockerfile: Dockerfile.dev
    container_name: SERVER_API
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: development
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      DB_TEST_HOST: ${DB_TEST_HOST}
      DB_TEST_PORT: ${DB_TEST_PORT}
      DB_TEST_USERNAME: ${DB_TEST_USERNAME}
      DB_TEST_PASSWORD: ${DB_TEST_PASSWORD}
      DB_TEST_DATABASE: ${DB_TEST_DATABASE}
      APP_PORT: ${APP_PORT}
      APP_URL: ${APP_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      STORAGE_DRIVER: ${STORAGE_DRIVER}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      AWS_BUCKET_NAME: ${AWS_BUCKET_NAME}
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - db_app
    networks:
      - app-network

  website:
    build:
      context: website/.
      dockerfile: Dockerfile.dev
    container_name: WEB_SITE
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      INTERNAL_API_URL: ${INTERNAL_API_URL}
      NEXT_PUBLIC_PLUGIN_ID: ${NEXT_PUBLIC_PLUGIN_ID}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    volumes:
      - ./website:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - server_api
    networks:
      - app-network
